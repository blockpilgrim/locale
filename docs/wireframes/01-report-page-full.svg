<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1600" width="800" height="1600">
  <defs>
    <style>
      text { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; }
      .title { font-size: 14px; font-weight: 700; fill: #1C1917; }
      .label { font-size: 11px; fill: #78716C; }
      .annotation { font-size: 10px; fill: #2D5A3D; font-style: italic; }
      .section-label { font-size: 12px; font-weight: 600; fill: #44403C; }
      .wireframe-bg { fill: #FAFAFA; }
      .section-block { fill: #FFFFFF; stroke: #E7E0D6; stroke-width: 1; }
      .placeholder { fill: #F0EBE3; stroke: #CFC2B0; stroke-width: 1; stroke-dasharray: 4,3; }
      .highlight-block { fill: #E8F0EB; stroke: #2D5A3D; stroke-width: 1.5; }
      .new-badge { fill: #2D5A3D; }
      .new-badge-text { font-size: 9px; fill: white; font-weight: 700; }
      .divider { stroke: #E7E0D6; stroke-width: 1; }
      .annotation-line { stroke: #2D5A3D; stroke-width: 1; stroke-dasharray: 3,2; }
      .text-placeholder { fill: #CFC2B0; rx: 2; }
      .heading-placeholder { fill: #9C8B72; rx: 2; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="1600" class="wireframe-bg"/>

  <!-- Page title -->
  <text x="400" y="30" text-anchor="middle" class="title" font-size="16">REPORT PAGE — FULL LAYOUT WITH ARCHETYPE</text>
  <line x1="100" y1="40" x2="700" y2="40" class="divider"/>

  <!-- ==================== HEADER ==================== -->
  <rect x="80" y="60" width="640" height="80" class="section-block" rx="4"/>
  <text x="100" y="85" class="section-label">HEADER</text>
  <!-- Logo placeholder -->
  <rect x="100" y="95" width="80" height="14" class="heading-placeholder"/>
  <!-- Address -->
  <rect x="100" y="115" width="260" height="10" class="text-placeholder"/>
  <rect x="100" y="129" width="140" height="10" class="text-placeholder"/>

  <!-- ==================== ARCHETYPE BANNER (NEW) ==================== -->
  <rect x="80" y="156" width="640" height="140" class="highlight-block" rx="4"/>
  <!-- NEW badge -->
  <rect x="688" y="156" width="36" height="18" class="new-badge" rx="3"/>
  <text x="706" y="168" text-anchor="middle" class="new-badge-text">NEW</text>

  <text x="100" y="178" class="section-label">ARCHETYPE BANNER</text>

  <!-- Archetype label (large serif) -->
  <rect x="100" y="190" width="280" height="22" rx="2" fill="#2D5A3D" opacity="0.2"/>
  <text x="110" y="206" font-size="15" font-weight="700" fill="#2D5A3D" font-family="Georgia, serif">The Brownstone Belt</text>

  <!-- Tagline (italic) -->
  <rect x="100" y="220" width="340" height="10" class="text-placeholder"/>
  <text x="100" y="245" class="label" font-style="italic">↑ tagline in Inter italic</text>

  <!-- Defining traits -->
  <rect x="100" y="260" width="90" height="8" class="text-placeholder"/>
  <circle cx="200" cy="264" r="2" fill="#9C8B72"/>
  <rect x="210" y="260" width="100" height="8" class="text-placeholder"/>
  <circle cx="320" cy="264" r="2" fill="#9C8B72"/>
  <rect x="330" y="260" width="80" height="8" class="text-placeholder"/>
  <text x="100" y="282" class="label">↑ 3 defining traits separated by middots</text>

  <!-- Pentagon (right side on desktop) -->
  <g transform="translate(580, 220)">
    <!-- Pentagon background -->
    <polygon points="0,-40 38,-12 24,32 -24,32 -38,-12" fill="none" stroke="#CFC2B0" stroke-width="1"/>
    <!-- Pentagon data fill -->
    <polygon points="0,-34 32,-10 18,26 -18,26 -30,-8" fill="#2D5A3D" fill-opacity="0.15" stroke="#2D5A3D" stroke-width="1.5"/>
    <!-- Axis labels -->
    <text x="0" y="-48" text-anchor="middle" font-size="8" fill="#78716C">Walkable</text>
    <text x="48" y="-8" text-anchor="start" font-size="8" fill="#78716C">Buzzing</text>
    <text x="32" y="44" text-anchor="start" font-size="8" fill="#78716C">Settled</text>
    <text x="-32" y="44" text-anchor="end" font-size="8" fill="#78716C">Accessible</text>
    <text x="-48" y="-8" text-anchor="end" font-size="8" fill="#78716C">Diverse</text>
  </g>

  <!-- Annotation -->
  <line x1="730" y1="226" x2="750" y2="226" class="annotation-line"/>
  <text x="753" y="222" class="annotation">Pentagon: desktop right,</text>
  <text x="753" y="234" class="annotation">mobile below text</text>

  <!-- ==================== MAP ==================== -->
  <rect x="80" y="312" width="640" height="180" class="section-block" rx="4"/>
  <text x="100" y="334" class="section-label">INTERACTIVE MAP</text>
  <!-- Map placeholder with crosshatch -->
  <rect x="100" y="344" width="600" height="130" class="placeholder"/>
  <text x="400" y="415" text-anchor="middle" class="label">Mapbox GL JS — isochrone + POI markers</text>

  <!-- ==================== DATA SECTIONS ==================== -->
  <!-- Demographics -->
  <rect x="80" y="508" width="640" height="100" class="section-block" rx="4"/>
  <text x="100" y="530" class="section-label">DEMOGRAPHICS</text>
  <rect x="100" y="540" width="120" height="50" class="placeholder"/>
  <rect x="240" y="540" width="120" height="50" class="placeholder"/>
  <rect x="380" y="540" width="120" height="50" class="placeholder"/>
  <rect x="520" y="540" width="120" height="50" class="placeholder"/>
  <text x="160" y="570" text-anchor="middle" class="label">StatCard</text>
  <text x="300" y="570" text-anchor="middle" class="label">StatCard</text>
  <text x="440" y="570" text-anchor="middle" class="label">StatCard</text>
  <text x="580" y="570" text-anchor="middle" class="label">StatCard</text>

  <!-- Housing -->
  <rect x="80" y="624" width="640" height="100" class="section-block" rx="4"/>
  <text x="100" y="646" class="section-label">HOUSING</text>
  <rect x="100" y="656" width="280" height="50" class="placeholder"/>
  <rect x="400" y="656" width="280" height="50" class="placeholder"/>
  <text x="240" y="686" text-anchor="middle" class="label">ComparisonBars</text>
  <text x="540" y="686" text-anchor="middle" class="label">StatCards</text>

  <!-- Economic -->
  <rect x="80" y="740" width="640" height="80" class="section-block" rx="4"/>
  <text x="100" y="762" class="section-label">ECONOMIC SNAPSHOT</text>
  <rect x="100" y="772" width="580" height="30" class="placeholder"/>

  <!-- Getting Around -->
  <rect x="80" y="836" width="640" height="80" class="section-block" rx="4"/>
  <text x="100" y="858" class="section-label">GETTING AROUND</text>
  <rect x="100" y="868" width="580" height="30" class="placeholder"/>

  <!-- What's Nearby -->
  <rect x="80" y="932" width="640" height="80" class="section-block" rx="4"/>
  <text x="100" y="954" class="section-label">WHAT'S NEARBY</text>
  <rect x="100" y="964" width="580" height="30" class="placeholder"/>

  <!-- ==================== VIBE CHECK ==================== -->
  <rect x="80" y="1028" width="640" height="140" class="section-block" rx="4"/>
  <text x="100" y="1050" class="section-label">THE VIBE CHECK (AI NARRATIVE)</text>
  <rect x="100" y="1060" width="580" height="8" class="text-placeholder"/>
  <rect x="100" y="1074" width="540" height="8" class="text-placeholder"/>
  <rect x="100" y="1088" width="560" height="8" class="text-placeholder"/>
  <rect x="100" y="1102" width="500" height="8" class="text-placeholder"/>
  <rect x="100" y="1116" width="580" height="8" class="text-placeholder"/>
  <rect x="100" y="1130" width="420" height="8" class="text-placeholder"/>
  <rect x="100" y="1144" width="530" height="8" class="text-placeholder"/>

  <!-- ==================== SHARE SECTION (UPGRADED) ==================== -->
  <rect x="80" y="1184" width="640" height="200" class="highlight-block" rx="4"/>
  <rect x="688" y="1184" width="36" height="18" class="new-badge" rx="3"/>
  <text x="706" y="1196" text-anchor="middle" class="new-badge-text">NEW</text>

  <text x="100" y="1206" class="section-label">SHARE SECTION (UPGRADED)</text>

  <!-- Card preview -->
  <rect x="100" y="1218" width="240" height="126" class="placeholder"/>
  <text x="220" y="1288" text-anchor="middle" class="label">Card Preview</text>

  <!-- Share buttons -->
  <rect x="370" y="1218" width="140" height="36" rx="4" fill="#E8F0EB" stroke="#2D5A3D" stroke-width="1"/>
  <text x="440" y="1240" text-anchor="middle" font-size="11" fill="#2D5A3D">Copy Link</text>

  <rect x="370" y="1264" width="140" height="36" rx="4" fill="#2D5A3D"/>
  <text x="440" y="1286" text-anchor="middle" font-size="11" fill="white" font-weight="600">Download Card</text>

  <rect x="370" y="1310" width="66" height="30" rx="4" fill="#E8F0EB" stroke="#2D5A3D" stroke-width="1"/>
  <text x="403" y="1329" text-anchor="middle" font-size="9" fill="#2D5A3D">Twitter</text>
  <rect x="444" y="1310" width="66" height="30" rx="4" fill="#E8F0EB" stroke="#2D5A3D" stroke-width="1"/>
  <text x="477" y="1329" text-anchor="middle" font-size="9" fill="#2D5A3D">Facebook</text>

  <!-- CTA text -->
  <rect x="370" y="1354" width="200" height="8" class="text-placeholder"/>
  <text x="370" y="1374" class="label">↑ "What's your neighborhood?" CTA</text>

  <!-- Annotation -->
  <line x1="730" y1="1280" x2="750" y2="1280" class="annotation-line"/>
  <text x="753" y="1276" class="annotation">"Download Card" is new —</text>
  <text x="753" y="1288" class="annotation">downloads Story Card PNG</text>

  <!-- ==================== PAGE FLOW ANNOTATIONS ==================== -->
  <!-- Left-side flow arrows -->
  <g transform="translate(40, 0)">
    <line x1="20" y1="100" x2="20" y2="1380" stroke="#CFC2B0" stroke-width="1" stroke-dasharray="4,2"/>

    <!-- Flow markers -->
    <circle cx="20" cy="100" r="8" fill="#FAF7F2" stroke="#2D5A3D" stroke-width="1.5"/>
    <text x="20" y="104" text-anchor="middle" font-size="8" fill="#2D5A3D" font-weight="700">1</text>

    <circle cx="20" cy="226" r="8" fill="#E8F0EB" stroke="#2D5A3D" stroke-width="1.5"/>
    <text x="20" y="230" text-anchor="middle" font-size="8" fill="#2D5A3D" font-weight="700">2</text>

    <circle cx="20" cy="400" r="8" fill="#FAF7F2" stroke="#2D5A3D" stroke-width="1.5"/>
    <text x="20" y="404" text-anchor="middle" font-size="8" fill="#2D5A3D" font-weight="700">3</text>

    <circle cx="20" cy="780" r="8" fill="#FAF7F2" stroke="#2D5A3D" stroke-width="1.5"/>
    <text x="20" y="784" text-anchor="middle" font-size="8" fill="#2D5A3D" font-weight="700">4</text>

    <circle cx="20" cy="1098" r="8" fill="#FAF7F2" stroke="#2D5A3D" stroke-width="1.5"/>
    <text x="20" y="1102" text-anchor="middle" font-size="8" fill="#2D5A3D" font-weight="700">5</text>

    <circle cx="20" cy="1284" r="8" fill="#E8F0EB" stroke="#2D5A3D" stroke-width="1.5"/>
    <text x="20" y="1288" text-anchor="middle" font-size="8" fill="#2D5A3D" font-weight="700">6</text>
  </g>

  <!-- Legend -->
  <rect x="80" y="1420" width="640" height="80" rx="4" fill="#FAF7F2" stroke="#E7E0D6" stroke-width="1"/>
  <text x="100" y="1440" class="section-label">LEGEND</text>
  <rect x="100" y="1452" width="16" height="12" class="highlight-block"/>
  <text x="122" y="1462" class="label">New / modified sections (archetype feature)</text>
  <rect x="100" y="1472" width="16" height="12" class="section-block"/>
  <text x="122" y="1482" class="label">Existing sections (unchanged)</text>
  <text x="400" y="1462" class="annotation">Green circled numbers = page scroll order</text>
  <text x="400" y="1482" class="label">Viewport: Desktop (1024px+)</text>
</svg>