<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <style>
      text { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; }
      .title { font-size: 14px; font-weight: 700; fill: #1C1917; }
      .label { font-size: 10px; fill: #78716C; }
      .annotation { font-size: 10px; fill: #2D5A3D; font-style: italic; }
      .dim { font-size: 9px; fill: #B8A68E; }
      .step-box { fill: #FFFFFF; stroke: #E7E0D6; stroke-width: 1.5; }
      .new-box { fill: #E8F0EB; stroke: #2D5A3D; stroke-width: 1.5; }
      .arrow { stroke: #9C8B72; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .new-arrow { stroke: #2D5A3D; stroke-width: 1.5; fill: none; marker-end: url(#arrowGreen); }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9C8B72"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A3D"/>
    </marker>
  </defs>

  <rect width="960" height="540" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="480" y="24" text-anchor="middle" class="title" font-size="16">REPORT GENERATION FLOW — WITH ARCHETYPE STEP</text>
  <line x1="60" y1="34" x2="900" y2="34" stroke="#E7E0D6"/>

  <!-- ==================== STEP 1: User Input ==================== -->
  <rect x="40" y="60" width="160" height="60" class="step-box" rx="6"/>
  <text x="120" y="85" text-anchor="middle" font-size="11" fill="#44403C" font-weight="600">User enters</text>
  <text x="120" y="100" text-anchor="middle" font-size="11" fill="#44403C" font-weight="600">address</text>

  <line x1="200" y1="90" x2="240" y2="90" class="arrow"/>

  <!-- ==================== STEP 2: POST /generate ==================== -->
  <rect x="248" y="50" width="180" height="80" class="step-box" rx="6"/>
  <text x="338" y="72" text-anchor="middle" font-size="10" fill="#78716C">POST</text>
  <text x="338" y="86" text-anchor="middle" font-size="11" fill="#44403C" font-weight="600">/api/report/generate</text>
  <text x="338" y="104" text-anchor="middle" font-size="9" fill="#9C8B72">Census + Isochrone + POI</text>
  <text x="338" y="116" text-anchor="middle" font-size="9" fill="#9C8B72">(parallel fetch)</text>

  <line x1="428" y1="90" x2="468" y2="90" class="arrow"/>

  <!-- ==================== STEP 3: Insert + Redirect ==================== -->
  <rect x="476" y="60" width="140" height="60" class="step-box" rx="6"/>
  <text x="546" y="82" text-anchor="middle" font-size="11" fill="#44403C" font-weight="600">Insert report</text>
  <text x="546" y="98" text-anchor="middle" font-size="9" fill="#9C8B72">status: generating</text>
  <text x="546" y="112" text-anchor="middle" font-size="9" fill="#9C8B72">→ redirect /report/[slug]</text>

  <!-- Down arrow to report page -->
  <line x1="546" y1="120" x2="546" y2="160" class="arrow"/>

  <!-- ==================== STEP 4: Report Page (loading) ==================== -->
  <rect x="436" y="168" width="220" height="50" class="step-box" rx="6"/>
  <text x="546" y="190" text-anchor="middle" font-size="11" fill="#44403C" font-weight="600">Report page loads (SSR)</text>
  <text x="546" y="204" text-anchor="middle" font-size="9" fill="#9C8B72">Map + data sections render, narrative pending</text>

  <!-- Fork: Archetype + AutoRefresh -->
  <line x1="546" y1="218" x2="546" y2="250" class="new-arrow"/>

  <!-- ==================== STEP 5: ARCHETYPE (NEW) ==================== -->
  <rect x="390" y="258" width="200" height="70" class="new-box" rx="6"/>
  <rect x="555" y="258" width="36" height="16" rx="3" fill="#2D5A3D"/>
  <text x="573" y="269" text-anchor="middle" font-size="8" fill="white" font-weight="700">NEW</text>
  <text x="490" y="278" text-anchor="middle" font-size="10" fill="#2D5A3D" font-weight="600">ArchetypeTrigger</text>
  <text x="490" y="294" text-anchor="middle" font-size="10" fill="#44403C">POST /api/report/[slug]/</text>
  <text x="490" y="308" text-anchor="middle" font-size="10" fill="#44403C">archetype</text>
  <text x="490" y="322" text-anchor="middle" font-size="9" fill="#9C8B72">Claude @ temp 0.3, ~1-2s</text>

  <!-- AutoRefresh (side) -->
  <rect x="660" y="258" width="140" height="50" class="step-box" rx="6"/>
  <text x="730" y="280" text-anchor="middle" font-size="10" fill="#44403C" font-weight="600">AutoRefresh</text>
  <text x="730" y="296" text-anchor="middle" font-size="9" fill="#9C8B72">polling router.refresh()</text>

  <line x1="590" y1="283" x2="660" y2="283" stroke="#CFC2B0" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="625" y="276" text-anchor="middle" font-size="8" fill="#B8A68E">parallel</text>

  <!-- Arrow down from archetype -->
  <line x1="490" y1="328" x2="490" y2="368" class="new-arrow"/>

  <!-- ==================== STEP 6: NARRATIVE ==================== -->
  <rect x="390" y="376" width="200" height="60" class="step-box" rx="6"/>
  <text x="490" y="398" text-anchor="middle" font-size="10" fill="#44403C" font-weight="600">NarrativeTrigger</text>
  <text x="490" y="414" text-anchor="middle" font-size="10" fill="#44403C">POST /api/report/[slug]/narrative</text>
  <text x="490" y="428" text-anchor="middle" font-size="9" fill="#9C8B72">Claude @ temp 0.7, streaming</text>

  <!-- Arrow down -->
  <line x1="490" y1="436" x2="490" y2="468" class="arrow"/>

  <!-- ==================== STEP 7: Complete ==================== -->
  <rect x="420" y="476" width="140" height="40" rx="6" fill="#2D5A3D"/>
  <text x="490" y="500" text-anchor="middle" font-size="12" fill="white" font-weight="600">Report Complete</text>

  <!-- ==================== TIMING ANNOTATIONS ==================== -->
  <!-- Timeline on left -->
  <g transform="translate(20, 0)">
    <line x1="16" y1="90" x2="16" y2="496" stroke="#CFC2B0" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="16" y="86" text-anchor="middle" font-size="8" fill="#B8A68E">t=0</text>
    <text x="16" y="174" text-anchor="middle" font-size="8" fill="#B8A68E">~2s</text>
    <text x="16" y="290" text-anchor="middle" font-size="8" fill="#2D5A3D">~3s</text>
    <text x="16" y="400" text-anchor="middle" font-size="8" fill="#B8A68E">~5s</text>
    <text x="16" y="498" text-anchor="middle" font-size="8" fill="#B8A68E">~15s</text>
  </g>

  <!-- Right-side annotations -->
  <rect x="720" y="370" width="220" height="80" rx="4" fill="#FAF7F2" stroke="#E7E0D6"/>
  <text x="736" y="388" font-size="10" font-weight="600" fill="#44403C">KEY CHANGES</text>
  <text x="736" y="404" class="annotation">1. ArchetypeTrigger fires first</text>
  <text x="736" y="418" class="annotation">2. On completion → NarrativeTrigger</text>
  <text x="736" y="432" class="annotation">3. Archetype can inform narrative</text>
  <text x="736" y="446" class="annotation">4. Failure → null (graceful degrade)</text>
</svg>