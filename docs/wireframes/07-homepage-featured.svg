<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" width="960" height="500">
  <defs>
    <style>
      text { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; }
      .title { font-size: 14px; font-weight: 700; fill: #1C1917; }
      .label { font-size: 10px; fill: #78716C; }
      .annotation { font-size: 10px; fill: #2D5A3D; font-style: italic; }
      .dim { font-size: 9px; fill: #B8A68E; }
    </style>
  </defs>

  <rect width="960" height="500" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="480" y="24" text-anchor="middle" class="title" font-size="16">HOMEPAGE — FEATURED CARDS WITH ARCHETYPE BADGE</text>
  <line x1="60" y1="34" x2="900" y2="34" stroke="#E7E0D6"/>

  <!-- Section header -->
  <text x="480" y="62" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#1C1917" font-weight="700">Explore Neighborhoods</text>
  <text x="480" y="80" text-anchor="middle" font-size="11" fill="#78716C">See what Locale reveals about places across the country</text>

  <!-- ==================== CARD 1 ==================== -->
  <g transform="translate(80, 100)">
    <rect width="240" height="300" rx="8" fill="#FFFFFF" stroke="#E7E0D6" stroke-width="1"/>
    <!-- Map thumbnail placeholder -->
    <rect x="0" y="0" width="240" height="140" rx="8 8 0 0" fill="#E8F0EB" stroke="none"/>
    <rect x="0" y="0" width="240" height="140" rx="8" fill="none" stroke="#E7E0D6" stroke-width="1"/>
    <text x="120" y="76" text-anchor="middle" class="label">Mapbox thumbnail</text>

    <!-- ARCHETYPE BADGE (overlaid on map) -->
    <rect x="8" y="112" width="140" height="24" rx="4" fill="#2D5A3D" opacity="0.9"/>
    <text x="78" y="128" text-anchor="middle" font-size="10" fill="white" font-weight="600">The Brownstone Belt</text>

    <!-- Card content -->
    <text x="16" y="168" font-size="14" font-weight="600" fill="#1C1917">Park Slope</text>
    <text x="16" y="186" font-size="11" fill="#78716C">Brooklyn, NY</text>

    <!-- Mini vibe bars -->
    <g transform="translate(16, 200)">
      <text x="0" y="10" font-size="8" fill="#9C8B72">Walkable</text>
      <rect x="60" y="2" width="140" height="8" rx="2" fill="#F0EBE3"/>
      <rect x="60" y="2" width="119" height="8" rx="2" fill="#2D5A3D" opacity="0.3"/>

      <text x="0" y="26" font-size="8" fill="#9C8B72">Buzzing</text>
      <rect x="60" y="18" width="140" height="8" rx="2" fill="#F0EBE3"/>
      <rect x="60" y="18" width="87" height="8" rx="2" fill="#2D5A3D" opacity="0.3"/>

      <text x="0" y="42" font-size="8" fill="#9C8B72">Settled</text>
      <rect x="60" y="34" width="140" height="8" rx="2" fill="#F0EBE3"/>
      <rect x="60" y="34" width="109" height="8" rx="2" fill="#2D5A3D" opacity="0.3"/>
    </g>

    <!-- View report link -->
    <text x="16" y="280" font-size="11" fill="#2D5A3D" font-weight="600">View Full Report →</text>
  </g>

  <!-- ==================== CARD 2 ==================== -->
  <g transform="translate(360, 100)">
    <rect width="240" height="300" rx="8" fill="#FFFFFF" stroke="#E7E0D6" stroke-width="1"/>
    <rect x="0" y="0" width="240" height="140" rx="8 8 0 0" fill="#E8F0EB" stroke="none"/>
    <rect x="0" y="0" width="240" height="140" rx="8" fill="none" stroke="#E7E0D6" stroke-width="1"/>
    <text x="120" y="76" text-anchor="middle" class="label">Mapbox thumbnail</text>

    <!-- ARCHETYPE BADGE -->
    <rect x="8" y="112" width="120" height="24" rx="4" fill="#2D5A3D" opacity="0.9"/>
    <text x="68" y="128" text-anchor="middle" font-size="10" fill="white" font-weight="600">The Urban Engine</text>

    <text x="16" y="168" font-size="14" font-weight="600" fill="#1C1917">Midtown Manhattan</text>
    <text x="16" y="186" font-size="11" fill="#78716C">New York, NY</text>

    <g transform="translate(16, 200)">
      <text x="0" y="10" font-size="8" fill="#9C8B72">Walkable</text>
      <rect x="60" y="2" width="140" height="8" rx="2" fill="#F0EBE3"/>
      <rect x="60" y="2" width="136" height="8" rx="2" fill="#2D5A3D" opacity="0.3"/>

      <text x="0" y="26" font-size="8" fill="#9C8B72">Buzzing</text>
      <rect x="60" y="18" width="140" height="8" rx="2" fill="#F0EBE3"/>
      <rect x="60" y="18" width="132" height="8" rx="2" fill="#2D5A3D" opacity="0.3"/>

      <text x="0" y="42" font-size="8" fill="#9C8B72">Settled</text>
      <rect x="60" y="34" width="140" height="8" rx="2" fill="#F0EBE3"/>
      <rect x="60" y="34" width="56" height="8" rx="2" fill="#2D5A3D" opacity="0.3"/>
    </g>

    <text x="16" y="280" font-size="11" fill="#2D5A3D" font-weight="600">View Full Report →</text>
  </g>

  <!-- ==================== CARD 3 ==================== -->
  <g transform="translate(640, 100)">
    <rect width="240" height="300" rx="8" fill="#FFFFFF" stroke="#E7E0D6" stroke-width="1"/>
    <rect x="0" y="0" width="240" height="140" rx="8 8 0 0" fill="#E8F0EB" stroke="none"/>
    <rect x="0" y="0" width="240" height="140" rx="8" fill="none" stroke="#E7E0D6" stroke-width="1"/>
    <text x="120" y="76" text-anchor="middle" class="label">Mapbox thumbnail</text>

    <!-- ARCHETYPE BADGE -->
    <rect x="8" y="112" width="160" height="24" rx="4" fill="#2D5A3D" opacity="0.9"/>
    <text x="88" y="128" text-anchor="middle" font-size="10" fill="white" font-weight="600">Cul-de-Sac Country</text>

    <text x="16" y="168" font-size="14" font-weight="600" fill="#1C1917">Naperville</text>
    <text x="16" y="186" font-size="11" fill="#78716C">Naperville, IL</text>

    <g transform="translate(16, 200)">
      <text x="0" y="10" font-size="8" fill="#9C8B72">Walkable</text>
      <rect x="60" y="2" width="140" height="8" rx="2" fill="#F0EBE3"/>
      <rect x="60" y="2" width="42" height="8" rx="2" fill="#2D5A3D" opacity="0.3"/>

      <text x="0" y="26" font-size="8" fill="#9C8B72">Buzzing</text>
      <rect x="60" y="18" width="140" height="8" rx="2" fill="#F0EBE3"/>
      <rect x="60" y="18" width="28" height="8" rx="2" fill="#2D5A3D" opacity="0.3"/>

      <text x="0" y="42" font-size="8" fill="#9C8B72">Settled</text>
      <rect x="60" y="34" width="140" height="8" rx="2" fill="#F0EBE3"/>
      <rect x="60" y="34" width="98" height="8" rx="2" fill="#2D5A3D" opacity="0.3"/>
    </g>

    <text x="16" y="280" font-size="11" fill="#2D5A3D" font-weight="600">View Full Report →</text>
  </g>

  <!-- ==================== ANNOTATIONS ==================== -->
  <!-- Badge annotation -->
  <line x1="228" y1="222" x2="228" y2="240" stroke="#2D5A3D" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="100" y="254" class="annotation">NEW: Archetype badge overlays map thumbnail</text>
  <text x="100" y="266" class="annotation">position: absolute, bottom-left of image</text>

  <!-- Vibe bars annotation -->
  <line x1="880" y1="340" x2="910" y2="340" stroke="#2D5A3D" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="914" y="332" class="annotation">NEW: Mini vibe bars</text>
  <text x="914" y="344" class="annotation">replace stat text</text>
  <text x="914" y="356" class="annotation">(top 3 axes only)</text>

  <!-- Spec box -->
  <rect x="60" y="420" width="840" height="60" rx="4" fill="#FAF7F2" stroke="#E7E0D6"/>
  <text x="80" y="440" font-size="12" font-weight="600" fill="#44403C">NOTES</text>
  <text x="80" y="458" class="label">Badge only renders for reports that have archetype data. Existing reports without archetypes show current card (no badge).</text>
  <text x="80" y="474" class="label">Mini vibe bars show top 3 axes for scannability. Full pentagon visible on report page. Cards remain clickable → /report/[slug].</text>
</svg>